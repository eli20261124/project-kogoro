<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>異色部門 | Erotic-Grotesque Archive v2.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060607;--panel:#0B0B0C;--red:#8A0010;--crimson:#C62828;
  --white:#E8E8EA;--paper:#EADDCF;--grey:#888;--dim:#6E6E72;--border:#1A1A1C;
  --panel-glass:rgba(11,11,12,.95);--ts:0 1px 2px rgba(0,0,0,.8);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--white);
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  min-height:100dvh;overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom);
}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1000}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;cursor:pointer;font-family:inherit}

/* FOG z:500 */
#fog-overlay{
  position:fixed;inset:0;z-index:500;
  background:radial-gradient(ellipse at 50% 40%,#100002 0%,#060607 65%);
  pointer-events:all;transition:opacity 2s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
#fog-overlay.cleared{opacity:0;pointer-events:none}
.fog-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 15%,rgba(0,0,0,.88) 100%);pointer-events:none}
.fog-seal{
  width:88px;height:88px;border:1px solid rgba(138,0,16,.45);border-radius:50%;
  display:grid;place-items:center;
  font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.15em;color:rgba(138,0,16,.6);
  animation:seal-pulse 3s ease-in-out infinite;position:relative;z-index:1;
}
@keyframes seal-pulse{0%,100%{box-shadow:0 0 12px rgba(138,0,16,.1)}50%{box-shadow:0 0 36px rgba(138,0,16,.3)}}
#fog-prompt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.25em;color:var(--dim);text-align:center;position:relative;z-index:1;text-shadow:var(--ts)}
.fog-taps{display:flex;gap:8px;justify-content:center;position:relative;z-index:1}
.fog-pip{width:9px;height:9px;border-radius:50%;background:var(--border);transition:background .3s,transform .3s}
.fog-pip.lit{background:var(--red);transform:scale(1.4)}

/* Splatter canvas z:501 — above fog, pointer-events:none */
#splatter-canvas{position:fixed;inset:0;pointer-events:none;z-index:501}
/* Blood stains z:502 */
.blood-stain{position:fixed;border-radius:50%;pointer-events:none;z-index:502;transform:translate(-50%,-50%);transition:opacity 5s cubic-bezier(.25,.46,.45,.94)}
.blood-stain.fading{opacity:0!important}

/* Controls z:900 */
#lang-mount{position:fixed;top:12px;right:12px;z-index:900;display:flex;gap:4px;align-items:center}
.lang-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:500;letter-spacing:.1em;border:1px solid var(--border);color:var(--dim);padding:5px 10px;min-height:44px;min-width:44px;transition:color .2s,border-color .2s;touch-action:manipulation}
.lang-btn.active,.lang-btn:hover{border-color:var(--red);color:var(--white)}
#audio-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:500;letter-spacing:.1em;border:1px solid var(--border);color:var(--dim);padding:5px 12px;min-height:44px;min-width:90px;transition:color .2s,border-color .2s,background .2s;touch-action:manipulation}
#audio-btn:hover{border-color:var(--red);color:var(--white)}
#audio-btn.on{border-color:var(--red);color:var(--red);background:rgba(138,0,16,.08)}

/* Layout */
.container{max-width:1000px;margin:0 auto;padding:clamp(24px,6vw,60px) clamp(16px,4vw,44px);position:relative;z-index:1}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.2em;color:var(--dim);border:1px solid var(--border);padding:0 18px;margin-bottom:44px;min-height:44px;touch-action:manipulation;transition:color .2s,border-color .2s}
.back-link:hover{color:var(--white);border-color:var(--red)}
.dept-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.3em;color:var(--red);text-transform:uppercase;margin-bottom:8px;text-shadow:var(--ts)}
.dept-title{font-family:'Noto Serif JP',serif;font-size:clamp(26px,5vw,38px);font-weight:600;letter-spacing:.08em;line-height:1.2;margin-bottom:6px;text-shadow:var(--ts)}
.dept-subtitle{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.2em;margin-bottom:40px;text-shadow:var(--ts)}

/* Category tabs */
.cat-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:28px}
.cat-tab{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;border:1px solid var(--border);color:var(--dim);padding:0 18px;min-height:44px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:color .2s,border-color .2s,background .2s;text-transform:uppercase;text-shadow:var(--ts)}
.cat-tab.active,.cat-tab:hover{border-color:var(--red);color:var(--white)}
.cat-tab.active{background:rgba(138,0,16,.1)}

/* Category drawer outer */
.cat-drawer{margin-bottom:6px}
.cat-drawer.hidden{display:none}
.drawer-header{
  width:100%;display:flex;align-items:center;gap:12px;padding:0 22px;min-height:64px;
  border:1px solid var(--border);border-left:4px solid var(--cat-clr,var(--red));
  background:var(--panel);cursor:pointer;text-align:left;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .2s;
}
.drawer-header:hover,.drawer-header[aria-expanded="true"]{background:rgba(138,0,16,.06)}
.drawer-cat-code{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.18em;color:var(--cat-clr,var(--red));min-width:46px;flex-shrink:0;text-shadow:var(--ts)}
.drawer-label{font-family:'Noto Serif JP',serif;font-size:clamp(15px,2.5vw,18px);font-weight:600;letter-spacing:.06em;flex:1;text-shadow:var(--ts)}
.drawer-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--grey);border:1px solid var(--border);padding:2px 10px;white-space:nowrap;flex-shrink:0;letter-spacing:.08em;text-shadow:var(--ts)}
.drawer-chevron{font-size:9px;color:var(--dim);transition:transform .35s cubic-bezier(.25,.46,.45,.94);flex-shrink:0;will-change:transform}
.drawer-header[aria-expanded="true"] .drawer-chevron{transform:rotate(90deg)}
.drawer-body{overflow:hidden;will-change:height}

/* Work accordion inner */
.work-item{margin-top:1px;contain:layout style}
.work-handle{
  width:100%;display:flex;align-items:center;gap:12px;padding:0 20px 0 34px;min-height:54px;
  border:1px solid rgba(26,26,28,.5);border-top:none;border-left:2px solid rgba(138,0,16,.2);
  background:rgba(6,6,7,.8);cursor:pointer;text-align:left;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  transition:background .2s;will-change:transform;
}
.work-handle:hover,.work-handle.open{background:rgba(138,0,16,.06);border-left-color:rgba(138,0,16,.65)}
.work-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:rgba(138,0,16,.45);min-width:52px;flex-shrink:0;letter-spacing:.1em;text-shadow:var(--ts)}
.work-main{flex:1;min-width:0}
.work-title-row{display:block;margin-bottom:2px}
.work-title{font-family:'Noto Serif JP',serif;font-size:clamp(13px,2vw,16px);font-weight:600;letter-spacing:.06em;color:var(--red);text-shadow:var(--ts)}
.work-zh{font-family:'Noto Serif JP',serif;font-size:11px;font-weight:400;color:var(--dim);margin-left:8px}
.work-en{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--grey);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.06em;text-shadow:var(--ts)}
.work-year{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--dim);white-space:nowrap;flex-shrink:0;letter-spacing:.06em;text-shadow:var(--ts)}
.work-chevron{font-size:8px;color:rgba(110,110,114,.4);transition:transform .3s;flex-shrink:0;will-change:transform}
.work-handle.open .work-chevron{transform:rotate(90deg)}
.work-body{overflow:hidden;will-change:height}

/* Work detail — backdrop-filter glass panel */
.work-detail{
  padding:24px 24px 24px 68px;
  border:1px solid rgba(26,26,28,.5);border-top:none;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  background:var(--panel-glass);position:relative;
}
@media(max-width:520px){.work-detail{padding:18px 16px}}

.detail-row{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
@media(max-width:640px){.detail-row{grid-template-columns:1fr}}
.detail-left{min-width:0}

/* Filing Layer: JetBrains Mono 13px 500 grey uppercase */
.filing{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;text-shadow:var(--ts);margin-bottom:10px;line-height:1.5}
.detail-category{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.22em;color:var(--red);text-transform:uppercase;text-shadow:var(--ts);margin-bottom:12px}

/* Dossier Layer: Noto Serif JP 500, titles 20px crimson, body 16px paper */
.detail-imagery{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:500;letter-spacing:.05em;color:var(--red);line-height:1.5;margin-bottom:14px;text-shadow:var(--ts)}
.detail-psych{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:500;line-height:1.9;color:var(--paper);margin-bottom:8px;text-shadow:var(--ts)}
.detail-psych-en{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:400;line-height:1.8;color:rgba(234,221,207,.55);font-style:italic;margin-bottom:16px;text-shadow:var(--ts)}
.detail-kws{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.detail-kw{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;color:var(--grey);border:1px solid var(--border);padding:4px 10px;text-transform:uppercase;text-shadow:var(--ts)}

/* Biomechanical Fusion Meter */
.fusion-block{margin-bottom:18px}
.fusion-header{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;text-shadow:var(--ts)}
.fusion-header span{color:var(--red);font-size:11px;font-weight:500}
.fusion-track{height:4px;background:rgba(26,26,28,.8);border-radius:2px;overflow:hidden}
.fusion-fill{height:100%;background:linear-gradient(90deg,var(--red) 0%,var(--crimson) 60%,#ff1744 100%);border-radius:2px;transform:scaleX(0);transform-origin:left;transition:transform 1.2s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.fusion-fill.go{transform:scaleX(var(--pct))}

/* Sensory Radar */
.radar-block{margin-bottom:18px}
.radar-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-bottom:8px;text-shadow:var(--ts)}
.radar-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.radar-svg-wrap{position:relative;width:110px;height:110px;flex-shrink:0;cursor:pointer}
.radar-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  min-width:200px;max-width:280px;
  background:rgba(11,11,12,.97);border:1px solid var(--border);
  font-family:'Noto Serif JP',serif;font-size:12px;font-weight:500;
  color:var(--paper);padding:10px 14px;line-height:1.7;
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:20;
  text-shadow:var(--ts);white-space:normal;
}
.radar-svg-wrap:hover .radar-tooltip{opacity:1}
.radar-svg-wrap:focus .radar-tooltip{opacity:1}
.radar-legend{display:flex;flex-wrap:wrap;gap:6px 12px}
.r-leg{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--grey);letter-spacing:.08em;display:flex;align-items:center;gap:5px;text-shadow:var(--ts)}
.r-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}

/* Tissue Sample */
.tissue-wrap{display:none;flex-shrink:0;flex-direction:column;align-items:center;gap:6px;align-self:start;padding-top:8px}
@media(min-width:480px){.tissue-wrap{display:flex}}
.tissue-circle{width:96px;height:96px;border-radius:50%;overflow:hidden;border:1px solid rgba(138,0,16,.3);position:relative;box-shadow:0 0 0 4px rgba(11,11,12,.8),0 0 24px rgba(138,0,16,.12)}
.tissue-inner{width:100%;height:100%;position:relative}
.tissue-inner::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,transparent 25%,rgba(0,0,0,.55) 100%)}
.tissue-label{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:500;letter-spacing:.15em;color:rgba(138,0,16,.55);text-transform:uppercase;text-shadow:var(--ts)}

/* Psychological EKG */
.ekg-block{margin-top:16px}
.ekg-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-bottom:6px;text-shadow:var(--ts)}
.ekg-wrap{position:relative;height:38px;border:1px solid rgba(26,26,28,.7);overflow:hidden;background:rgba(4,4,5,.85)}
canvas.ekg-c{position:absolute;inset:0;width:100%;height:100%}

/* Motif watermark */
.motif-bg{position:absolute;right:14px;bottom:14px;opacity:.04;pointer-events:none;color:var(--white)}
</style>
</head>

<script>
/* ═══ Audio Engine ═══ */
let _aC=null,_aG=null,_aF=null,_aOn=false,_aInit=false;
function initAudio(){
  if(_aInit)return;_aInit=true;
  try{
    _aC=new(window.AudioContext||window.webkitAudioContext)();
    const sr=_aC.sampleRate,len=sr*3,buf=_aC.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++){d[i]=(Math.random()*2-1)*.15;if(Math.random()<.001)d[i]*=5;}
    const src=_aC.createBufferSource();src.buffer=buf;src.loop=true;
    const osc=_aC.createOscillator();osc.frequency.value=55;
    const og=_aC.createGain();og.gain.value=.02;
    _aF=_aC.createBiquadFilter();_aF.type='lowpass';_aF.frequency.value=500;
    _aG=_aC.createGain();_aG.gain.value=0;
    src.connect(_aF);osc.connect(og);og.connect(_aF);
    _aF.connect(_aG);_aG.connect(_aC.destination);
    src.start();osc.start();
  }catch(e){console.warn('audio',e);}
}
function toggleAudio(){
  if(!_aInit)initAudio();if(!_aC)return;
  _aOn=!_aOn;_aG.gain.setTargetAtTime(_aOn?.06:0,_aC.currentTime,.5);
  const b=document.getElementById('audio-btn');b.classList.toggle('on',_aOn);
  const k=_aOn?'eg_audio_on':'eg_audio_off';b.setAttribute('data-i18n',k);b.textContent=t(k);
}
function clearAudioFilter(){if(_aC&&_aF)_aF.frequency.setTargetAtTime(4000,_aC.currentTime,2);}

/* ═══ Splatter Canvas z:501 ═══ */
const SC=document.getElementById('splatter-canvas');
const SX=SC.getContext('2d');
function rsz(){SC.width=innerWidth;SC.height=innerHeight;}rsz();
addEventListener('resize',rsz,{passive:true});
let ST=null;
function splatter(x,y){
  SC.style.transition='none';SC.style.opacity='1';
  for(let i=0,n=10+Math.floor(Math.random()*10);i<n;i++){
    const a=Math.random()*Math.PI*2,d=15+Math.random()*60,r=1+Math.random()*3.5;
    SX.beginPath();SX.arc(x+Math.cos(a)*d,y+Math.sin(a)*d,r,0,Math.PI*2);
    SX.fillStyle='rgba(160,0,0,'+(0.25+Math.random()*0.55)+')';SX.fill();
  }
  clearTimeout(ST);ST=setTimeout(()=>{SC.style.transition='opacity 9s ease-out';SC.style.opacity='0';},900);
}
function clearCanvas(){
  clearTimeout(ST);SC.style.transition='opacity 3s ease-out';SC.style.opacity='0';
  setTimeout(()=>SX.clearRect(0,0,SC.width,SC.height),3200);
}

/* ═══ Blood Stains z:502 ═══ */
function addStain(x,y){
  const el=document.createElement('div');el.className='blood-stain';
  const s=50+Math.random()*130,o=.3+Math.random()*.48;
  el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+s+'px;height:'+s+'px;opacity:'+o+';'+
    'background:radial-gradient(circle,rgba(160,0,0,'+o+') 0%,rgba(90,0,0,'+(o*.5)+') 42%,transparent 72%)';
  document.body.appendChild(el);
  const delay=2500+Math.random()*5000;
  setTimeout(()=>el.classList.add('fading'),delay);
  setTimeout(()=>{if(el.parentNode)el.remove();},delay+6000);
}

/* ═══ Fog Mechanic ═══ */
let _taps=0;const _TOTAL=5;
const _msgs=['eg_reveal_prompt','eg_reveal_1','eg_reveal_2','eg_reveal_3','eg_reveal_4'];
let _lt={x:0,y:0};
function handleTap(x,y){
  addStain(x,y);splatter(x,y);_taps++;
  const p=document.getElementById('pip'+(_taps-1));if(p)p.classList.add('lit');
  const pr=document.getElementById('fog-prompt');
  if(_taps<_TOTAL){const k=_msgs[_taps]||'eg_reveal_prompt';pr.setAttribute('data-i18n',k);pr.textContent=t(k);}
  else{pr.textContent=t('eg_revealed');setTimeout(()=>{document.getElementById('fog-overlay').classList.add('cleared');clearCanvas();clearAudioFilter();},400);}
}
const FOG=document.getElementById('fog-overlay');
FOG.addEventListener('touchstart',e=>{const t0=e.changedTouches[0];_lt={x:t0.clientX,y:t0.clientY};},{passive:true});
FOG.addEventListener('touchend',e=>{
  const t0=e.changedTouches[0];
  if(Math.abs(t0.clientX-_lt.x)<15&&Math.abs(t0.clientY-_lt.y)<15)handleTap(t0.clientX,t0.clientY);
  e.preventDefault();},{passive:false});
FOG.addEventListener('click',e=>handleTap(e.clientX,e.clientY));

/* ═══ SVG Motifs ═══ */
const MOTIFS={
  eye:'<svg width="48" height="48" viewBox="0 0 48 48"><ellipse cx="24" cy="24" rx="20" ry="10" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="24" cy="24" r="5" stroke="currentColor" stroke-width="1" fill="none"/><line x1="24" y1="4" x2="24" y2="14" stroke="currentColor" stroke-width=".5"/></svg>',
  hand:'<svg width="48" height="48" viewBox="0 0 48 48"><path d="M20 40L20 16Q20 13 23 13Q26 13 26 16L26 22Q27 20 30 20Q33 20 33 23L33 26Q34 24 37 24Q40 24 40 27L40 36Q40 42 34 44L22 44Q18 44 16 40Z" stroke="currentColor" stroke-width="1" fill="none"/></svg>',

/* ═══ Tissue Backgrounds by Category ═══ */
const TISSUE={
  objectification:'radial-gradient(circle at 38% 32%,rgba(200,120,80,.5) 0%,rgba(120,40,20,.7) 38%,rgba(18,6,4,.98) 100%)',
  voyeur:'radial-gradient(circle at 55% 45%,rgba(60,60,90,.5) 0%,rgba(30,30,55,.75) 40%,rgba(6,6,8,.98) 100%)',
  body:'radial-gradient(circle at 42% 38%,rgba(185,90,60,.55) 0%,rgba(100,28,18,.75) 40%,rgba(8,4,4,.98) 100%)',
  mirror:'radial-gradient(circle at 50% 50%,rgba(100,120,170,.42) 0%,rgba(38,48,80,.65) 40%,rgba(6,6,8,.98) 100%)',
  isolate:'radial-gradient(circle at 45% 40%,rgba(60,82,50,.45) 0%,rgba(20,40,20,.68) 40%,rgba(6,7,6,.98) 100%)'
};

/* ═══ Radar SVG Builder ═══ */
function buildRadar(r,quote){
  const axes=['touch','sight','sound','smell','taste'];
  const glyphs={touch:'触',sight:'視',sound:'聴',smell:'嗅',taste:'味'};
  const labelKeys={touch:'TOUCH',sight:'SIGHT',sound:'SOUND',smell:'SMELL',taste:'TASTE'};
  const cx=55,cy=55,maxR=40;
  const pts=axes.map((a,i)=>{
    const ang=(i/5)*Math.PI*2-Math.PI/2;
    const v=Math.min(10,Math.max(0,r[a]||0))/10;
    return {x:cx+Math.cos(ang)*maxR*v,y:cy+Math.sin(ang)*maxR*v,
            lx:cx+Math.cos(ang)*(maxR+13),ly:cy+Math.sin(ang)*(maxR+13),
            glyph:glyphs[a],key:labelKeys[a],val:r[a]||0};
  });
  const poly=pts.map(p=>p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  let grid='';
  for(let g=2;g<=10;g+=2){
    const gp=axes.map((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2;return (cx+Math.cos(a)*maxR*(g/10)).toFixed(1)+','+(cy+Math.sin(a)*maxR*(g/10)).toFixed(1);});
    grid+='<polygon points="'+gp.join(' ')+'" fill="none" stroke="rgba(110,110,114,.1)" stroke-width=".5"/>';
  }
  const axlines=axes.map((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2;return '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+Math.cos(a)*maxR).toFixed(1)+'" y2="'+(cy+Math.sin(a)*maxR).toFixed(1)+'" stroke="rgba(110,110,114,.15)" stroke-width=".5"/>';}).join('');
  const labels=pts.map(p=>'<text x="'+p.lx.toFixed(1)+'" y="'+(p.ly+3).toFixed(1)+'" text-anchor="middle" font-family="Noto Serif JP,serif" font-size="9" fill="rgba(136,136,136,.85)">'+p.glyph+'</text>').join('');
  const dots=pts.map(p=>'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3.5" fill="#8A0010" stroke="rgba(198,40,40,.7)" stroke-width="1"/>').join('');
  const safeQ=quote.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const legend=axes.map((a,i)=>'<span class="r-leg"><span class="r-dot" style="opacity:'+(Math.min(10,r[a]||0)/10)+'"></span>'+labelKeys[a]+' '+pts[i].val+'</span>').join('');
  return '<div class="radar-block">'+
    '<p class="radar-title">SENSORY THRESHOLD MAP</p>'+
    '<div class="radar-row">'+
      '<div class="radar-svg-wrap" tabindex="0">'+
        '<svg width="110" height="110" viewBox="0 0 110 110">'+
          grid+axlines+
          '<polygon points="'+poly+'" fill="rgba(138,0,16,.18)" stroke="rgba(198,40,40,.75)" stroke-width="1.3"/>'+
          labels+dots+
        '</svg>'+
        '<div class="radar-tooltip">'+safeQ+'</div>'+
      '</div>'+
      '<div class="radar-legend">'+legend+'</div>'+
    '</div>'+
  '</div>';
}

/* ═══ Fusion Meter ═══ */
function buildFusion(pct,id){
  const grade=pct>=85?'CRITICAL':pct>=65?'HIGH':pct>=40?'MODERATE':'LOW';
  return '<div class="fusion-block">'+
    '<div class="fusion-header">BIOMECHANICAL FUSION COEFFICIENT <span>'+pct+'% &middot; '+grade+'</span></div>'+
    '<div class="fusion-track"><div class="fusion-fill" id="ff-'+id+'" style="--pct:'+pct/100+'"></div></div>'+
  '</div>';
}

/* ═══ EKG Canvas ═══ */
function startEKG(canvas,speed){
  const W=canvas.width=canvas.offsetWidth||300;
  const H=canvas.height=canvas.offsetHeight||38;
  const ctx=canvas.getContext('2d');
  const spd=speed==='fast'?2.5:speed==='slow'?0.8:1.5;
  const collapseAt=speed==='fast'?3000:speed==='slow'?7000:5000;
  let x=0,phase=0,collapsed=false,colT=0,startT=null;
  function draw(now){
    if(!startT)startT=now;
    const elapsed=now-startT;
    if(!collapsed&&elapsed>collapseAt)collapsed=true;
    ctx.fillStyle='rgba(4,4,5,.12)';ctx.fillRect(0,0,W,H);
    const cy=H/2;ctx.beginPath();ctx.strokeStyle='rgba(138,0,16,.85)';ctx.lineWidth=1.2;
    const nx=x+spd;let ny=cy;
    if(!collapsed){
      const chaos=Math.min(1,Math.max(0,(elapsed-1000)/3000));
      ny=cy+Math.sin(phase*.08)*3+(Math.random()-.5)*chaos*12+(phase%40<4?-H*.35:0);
    }else{colT+=spd;ny=cy+(Math.random()-.5)*Math.max(0,1-colT/800)*2;}
    ctx.moveTo(x,ny);ctx.lineTo(nx,ny);ctx.stroke();
    x=nx%W;phase+=spd;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ═══ Categories ═══ */
const CATS=[
  {id:'objectification',i18nKey:'eg_tab_object',code:'OBJ',color:'#8A0010'},
  {id:'voyeur',i18nKey:'eg_tab_voyeur',code:'VOY',color:'#BF360C'},
  {id:'body',i18nKey:'eg_tab_body',code:'BOD',color:'#6A1B9A'},
  {id:'mirror',i18nKey:'eg_tab_mirror',code:'MIR',color:'#1565C0'},
  {id:'isolate',i18nKey:'eg_tab_isolate',code:'ISO',color:'#2E7D32'},
];

function titleFor(w){const l=getLang();return l==='zh'?w.titleZh:l==='en'?w.titleEn:w.title;}
function imageryFor(w){const l=getLang();return l==='zh'?w.imageryZh:l==='en'?w.imageryEn:w.imageryJa;}
function psychFor(w){const l=getLang();return l==='zh'?w.psychZh:l==='en'?w.psychEn:w.psychJa;}

function openBody(b){
  b.style.transition='height .4s cubic-bezier(.25,.46,.45,.94)';b.style.height='0';b.offsetHeight;
  b.style.height=b.scrollHeight+'px';
  b.addEventListener('transitionend',()=>{b.style.height='auto';b.style.transition='';},{once:true});
}
function closeBody(b){
  b.style.height=b.scrollHeight+'px';b.offsetHeight;
  b.style.transition='height .4s cubic-bezier(.25,.46,.45,.94)';b.style.height='0';
  b.addEventListener('transitionend',()=>{b.style.transition='';},{once:true});
}

/* ═══ Build Work Item ═══ */
function buildWorkItem(w){
  const item=document.createElement('div');item.className='work-item';
  const handle=document.createElement('button');handle.className='work-handle';handle.setAttribute('aria-expanded','false');
  const lang=getLang();
  handle.innerHTML=
    '<span class="work-num">FILE #'+String(w.id).padStart(2,'0')+'</span>'+
    '<span class="work-main">'+
      '<span class="work-title-row">'+
        '<span class="work-title">'+titleFor(w)+'</span>'+
        (lang==='ja'&&w.titleEn?'<span class="work-zh">'+w.titleEn+'</span>':'')+
      '</span>'+
      '<span class="work-en">'+w.titleEn+'</span>'+
    '</span>'+
    '<span class="work-year">'+w.year+'</span>'+
    '<span class="work-chevron">&#9654;</span>';

  const body=document.createElement('div');body.className='work-body';body.style.height='0';

  /* Tissue sample */
  const tbg=TISSUE[w.category]||TISSUE.objectification;
  const tissueHTML='<div class="tissue-wrap">'+
    '<div class="tissue-circle"><div class="tissue-inner" style="background:'+tbg+'"></div></div>'+
    '<span class="tissue-label">SAMPLE</span>'+
  '</div>';

  /* Radar + Fusion + EKG */
  const radarHTML=w.radar?buildRadar(w.radar,w.quote||''):'' ;
  const fusionHTML=w.fusion!=null?buildFusion(w.fusion,w.id):'';
  const ekgId='ekg'+w.id;
  const ekgHTML='<div class="ekg-block"><p class="ekg-label">PSYCHOLOGICAL EKG &mdash; COLLAPSE INDEX</p>'+
    '<div class="ekg-wrap"><canvas class="ekg-c" id="'+ekgId+'"></canvas></div></div>';

  const detail=document.createElement('div');detail.className='work-detail';
  detail.innerHTML=
    '<div class="detail-row">'+
      '<div class="detail-left">'+
        '<p class="detail-category">'+w.categoryLabel+'</p>'+
        '<p class="filing">'+w.title+(w.titleZh&&w.titleZh!==w.title?' / '+w.titleZh:'')+'</p>'+
        '<p class="detail-imagery">'+imageryFor(w)+'</p>'+
        '<p class="detail-psych">'+psychFor(w)+'</p>'+
        (lang!=='en'?'<p class="detail-psych-en">'+w.psychEn+'</p>':'')+
        '<div class="detail-kws">'+(w.keywords||[]).map(k=>'<span class="detail-kw">'+k+'</span>').join('')+'</div>'+
        fusionHTML+radarHTML+ekgHTML+
      '</div>'+
      tissueHTML+
    '</div>'+
    '<div class="motif-bg">'+(MOTIFS[w.svgMotif]||MOTIFS.eye)+'</div>';

  body.appendChild(detail);

  let _started=false;
  handle.addEventListener('click',()=>{
    const isOpen=handle.classList.contains('open');
    handle.classList.toggle('open',!isOpen);
    handle.setAttribute('aria-expanded',String(!isOpen));
    if(isOpen){closeBody(body);}
    else{
      openBody(body);
      if(!_started){_started=true;
        setTimeout(()=>{
          const ec=document.getElementById(ekgId);
          if(ec)startEKG(ec,w.ekg||'medium');
          const ff=document.getElementById('ff-'+w.id);
          if(ff){requestAnimationFrame(()=>requestAnimationFrame(()=>ff.classList.add('go')));}
        },55);
      }
    }
  });

  item.appendChild(handle);item.appendChild(body);
  return item;
}

/* ═══ Build Drawers ═══ */
function buildDrawers(works){
  const container=document.getElementById('archive-drawers');container.innerHTML='';
  CATS.forEach(cat=>{
    const cw=works.filter(w=>w.category===cat.id);if(!cw.length)return;
    const drawer=document.createElement('section');drawer.className='cat-drawer';drawer.dataset.cat=cat.id;drawer.style.setProperty('--cat-clr',cat.color);
    const header=document.createElement('button');header.className='drawer-header';header.setAttribute('aria-expanded','false');
    header.innerHTML='<span class="drawer-cat-code">'+cat.code+'</span>'+
      '<span class="drawer-label">'+t(cat.i18nKey)+'</span>'+
      '<span class="drawer-count">'+cw.length+' works</span>'+
      '<span class="drawer-chevron">&#9654;</span>';
    const body=document.createElement('div');body.className='drawer-body';body.style.height='0';
    cw.forEach(w=>body.appendChild(buildWorkItem(w)));
    header.addEventListener('click',()=>{
      const isOpen=header.getAttribute('aria-expanded')==='true';
      header.setAttribute('aria-expanded',String(!isOpen));
      if(isOpen)closeBody(body);else openBody(body);
    });
    drawer.appendChild(header);drawer.appendChild(body);
    container.appendChild(drawer);
  });
}

/* ═══ Tab Filter ═══ */
document.getElementById('cat-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.cat-tab');if(!btn)return;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');const cat=btn.dataset.cat;
  document.querySelectorAll('.cat-drawer').forEach(d=>{
    d.classList.toggle('hidden',cat!=='all'&&d.dataset.cat!==cat);
  });
  if(cat!=='all'){
    const target=document.querySelector('.cat-drawer[data-cat="'+cat+'"]');
    if(target){
      const h=target.querySelector('.drawer-header'),b=target.querySelector('.drawer-body');
      if(h.getAttribute('aria-expanded')==='false'){h.setAttribute('aria-expanded','true');openBody(b);}
      setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'start'}),60);
    }
  }
});

/* ═══ Boot ═══ */
async function loadWorks(){
  try{const r=await fetch('fetishes.json');const ws=await r.json();buildDrawers(ws);}
  catch(e){console.error('fetishes.json load error',e);}
}
window.addEventListener('load',()=>{
  const m=document.getElementById('lang-mount');
  const ab=document.createElement('button');ab.id='audio-btn';
  ab.setAttribute('data-i18n','eg_audio_off');ab.textContent=t('eg_audio_off');
  ab.addEventListener('click',toggleAudio);m.insertBefore(ab,m.firstChild);
  initLangSwitcher('lang-mount');applyI18n();loadWorks();
});
</script>
